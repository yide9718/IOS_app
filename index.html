<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>ж—¶й’ҹ</title>

<!-- iOS PWA: ж·»еҠ еҲ°дё»еұҸе№•еҗҺе…ЁеұҸиҝҗиЎҢ -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ж—¶й’ҹ">
<meta name="format-detection" content="telephone=no">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                 "Helvetica Neue", "PingFang SC", sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  .clock {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* йҖӮй…Қ iPhone еҲҳжө·/еңҶи§’ */
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center center;
  }
  /* ж—ӢиҪ¬жҢүй’® */
  .rotate-btn {
    position: fixed;
    top: max(env(safe-area-inset-top), 16px);
    right: max(env(safe-area-inset-right), 16px);
    width: 44px;
    height: 44px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    transition: background 0.2s, color 0.2s;
  }
  .rotate-btn:active {
    background: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.95);
  }
  .rotate-btn svg { width: 22px; height: 22px; }
  .time {
    /* з§‘жҠҖж„ҹ:зӯүе®Ҫеӯ—дҪ“ + и“қиүІиҫүе…ү */
    font-family: "SF Mono", "JetBrains Mono", "Roboto Mono", "Menlo",
                 "Courier New", monospace;
    font-size: clamp(72px, 22vw, 180px);
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;  /* зӯүе®Ҫж•°еӯ—,дёҚжҠ–еҠЁ */
    color: #e8f4ff;
    text-shadow:
      0 0 18px rgba(120, 200, 255, 0.45),
      0 0 42px rgba(80,  160, 255, 0.22),
      0 0 80px rgba(60,  120, 255, 0.12);
  }
  /* жЁӘеұҸж—ӢиҪ¬(90В°/270В°):еӯ—еҸҳеӨ§еҚ еұҸе№• ~80%,йҡҗи—Ҹз§’и…ҫеҮәз©әй—ҙ */
  .clock[data-rotation="90"] .time,
  .clock[data-rotation="270"] .time {
    font-size: min(80vw, 38vh);
    font-weight: 200;
  }
  .clock[data-rotation="90"] #timeS,
  .clock[data-rotation="270"] #timeS {
    display: none;
  }
  .date {
    font-size: clamp(15px, 4vw, 22px);
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    margin-top: 1.4em;
    letter-spacing: 0.1em;
  }
  /* жЁӘеұҸж—¶зј©е°ҸдёҖзӮ№ */
  @media (orientation: landscape) {
    .time { font-size: clamp(56px, 16vw, 150px); }
  }
</style>
</head>
<body>
  <div class="clock">
    <div class="time">
      <span id="timeHM">--:--</span><span id="timeS">:--</span>
    </div>
    <div class="date" id="date"></div>
  </div>
  <button id="rotateBtn" class="rotate-btn" aria-label="ж—ӢиҪ¬ж—¶й’ҹ" title="ж—ӢиҪ¬ж—¶й’ҹ">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/>
      <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
      <path d="M3 22v-6h6"/>
      <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg>
  </button>

<script>
  const timeHM = document.getElementById('timeHM');
  const timeS = document.getElementById('timeS');
  const dateEl = document.getElementById('date');
  const weekdays = ['жҳҹжңҹж—Ҙ','жҳҹжңҹдёҖ','жҳҹжңҹдәҢ','жҳҹжңҹдёү','жҳҹжңҹеӣӣ','жҳҹжңҹдә”','жҳҹжңҹе…ӯ'];

  const pad = n => String(n).padStart(2, '0');

  function update() {
    const now = new Date();
    timeHM.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    timeS.textContent = `:${pad(now.getSeconds())}`;
    dateEl.textContent =
      `${now.getFullYear()}е№ҙ${now.getMonth() + 1}жңҲ${now.getDate()}ж—Ҙ  В·  ${weekdays[now.getDay()]}`;
  }
  update();
  setInterval(update, 1000);

  // === ж—ӢиҪ¬жҺ§еҲ¶:жҜҸзӮ№дёҖж¬ЎжҢүй’®иҪ¬ 90В°,еҫӘзҺҜ 0вҶ’90вҶ’180вҶ’270вҶ’0 ===
  let rotation = 0;
  const rotateBtn = document.getElementById('rotateBtn');
  const clock = document.querySelector('.clock');

  function applyRotation() {
    // з”Ё data-rotation и§ҰеҸ‘ CSS еӯ—дҪ“и§„еҲҷ,дёҚеҶҚ scale ж•ҙдёӘе®№еҷЁ
    clock.setAttribute('data-rotation', rotation);
    let transform = '';
    if (rotation === 90 || rotation === 270) {
      transform = `rotate(${rotation}deg)`;
    } else if (rotation === 180) {
      transform = 'rotate(180deg)';
    }
    clock.style.transform = transform;
  }

  rotateBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    rotation = (rotation + 90) % 360;
    applyRotation();
  });
  window.addEventListener('resize', applyRotation);

  // === йҳІжӯўеұҸе№•иҮӘеҠЁдј‘зң (iOS 17+ ж”ҜжҢҒ Screen Wake Lock API) ===
  let wakeLock = null;
  async function requestWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) { /* дёҚж”ҜжҢҒе°ұеҝҪз•Ҙ */ }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
