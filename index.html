<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>时钟</title>

<!-- iOS PWA: 添加到主屏幕后全屏运行 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="时钟">
<meta name="format-detection" content="telephone=no">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                 "Helvetica Neue", "PingFang SC", sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  .clock {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* 适配 iPhone 刘海/圆角 */
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center center;
  }
  /* 旋转按钮 */
  .rotate-btn {
    position: fixed;
    top: max(env(safe-area-inset-top), 16px);
    right: max(env(safe-area-inset-right), 16px);
    width: 44px;
    height: 44px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    transition: background 0.2s, color 0.2s;
  }
  .rotate-btn:active {
    background: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.95);
  }
  .rotate-btn svg { width: 22px; height: 22px; }
  .time {
    font-size: clamp(72px, 22vw, 180px);
    font-weight: 200;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;  /* 等宽数字,不抖动 */
  }
  .date {
    font-size: clamp(15px, 4vw, 22px);
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    margin-top: 1.4em;
    letter-spacing: 0.1em;
  }
  /* 横屏时缩小一点 */
  @media (orientation: landscape) {
    .time { font-size: clamp(56px, 16vw, 150px); }
  }
</style>
</head>
<body>
  <div class="clock">
    <div class="time" id="time">--:--:--</div>
    <div class="date" id="date"></div>
  </div>
  <button id="rotateBtn" class="rotate-btn" aria-label="旋转时钟" title="旋转时钟">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/>
      <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
      <path d="M3 22v-6h6"/>
      <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg>
  </button>

<script>
  const timeEl = document.getElementById('time');
  const dateEl = document.getElementById('date');
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  const pad = n => String(n).padStart(2, '0');

  function update() {
    const now = new Date();
    timeEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    dateEl.textContent =
      `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日  ·  ${weekdays[now.getDay()]}`;
  }
  update();
  setInterval(update, 1000);

  // === 旋转控制:每点一次按钮转 90°,循环 0→90→180→270→0 ===
  let rotation = 0;
  const rotateBtn = document.getElementById('rotateBtn');
  const clock = document.querySelector('.clock');

  function applyRotation() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    let transform = '';
    if (rotation === 90 || rotation === 270) {
      // 旋转 90/270° 时,按视口宽高比缩放,避免内容左右溢出
      const scale = Math.min(w / h, 1);
      transform = `rotate(${rotation}deg) scale(${scale})`;
    } else if (rotation === 180) {
      transform = 'rotate(180deg)';
    }
    clock.style.transform = transform;
  }

  rotateBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    rotation = (rotation + 90) % 360;
    applyRotation();
  });
  window.addEventListener('resize', applyRotation);

  // === 防止屏幕自动休眠(iOS 17+ 支持 Screen Wake Lock API) ===
  let wakeLock = null;
  async function requestWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) { /* 不支持就忽略 */ }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
